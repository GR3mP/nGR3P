syntax = "proto3";

package xray.proxy.gmesh.inbound;
option csharp_namespace = "Xray.Proxy.GMesh.Inbound";
option go_package = "github.com/xtls/xray-core/proxy/gmesh/inbound";
option java_package = "com.xray.proxy.gmesh.inbound";
option java_multiple_files = true;

import "common/protocol/user.proto";

message Fallback {
  string name = 1;
  string alpn = 2;
  string path = 3;
  string type = 4;
  string dest = 5;
  uint64 xver = 6;
}

message Config {
  repeated xray.common.protocol.User clients = 1;
  repeated Fallback fallbacks = 2;

  string decryption = 3;
  uint32 xorMode = 4;
  int64 seconds_from = 5;
  int64 seconds_to = 6;
  string padding = 7;

  enum Mode {
    COMPATIBILITY = 0;
    RELAY = 1;
    LEAF = 2;
  }
  Mode mode = 8;
  string node_id = 9;
  uint32 version = 10;
}