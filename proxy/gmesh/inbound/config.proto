syntax = "proto3";

package xray.proxy.gmesh.inbound;
option csharp_namespace = "Xray.Proxy.GMesh.Inbound";
option go_package = "github.com/xtls/xray-core/proxy/gmesh/inbound";
option java_package = "com.xray.proxy.gmesh.inbound";
option java_multiple_files = true;

import "common/protocol/user.proto";

message Fallback {
  string name = 1;
  string alpn = 2;
  string path = 3;
  string type = 4;
  string dest = 5;
  uint64 xver = 6;
}

message Config {
  repeated xray.common.protocol.User clients = 1;
  repeated Fallback fallbacks = 2;

  string decryption = 3;
  uint32 xorMode = 4;
  string padding = 5;

  enum Mode {
    COMPATIBILITY = 0;
    RELAY = 1;
    LEAF = 2;
  }
  Mode mode = 6;

  string node_id = 7;
  uint32 version = 8;

  message Discovery {
    bool lan_discovery = 1;
    uint32 announcement_interval = 2;
    string dht_network_id = 3;
  }
  Discovery discovery = 9;

  message Routing {
    uint32 max_peers = 1;
    string strategy = 2;
    uint32 route_ttl = 3;
  }
  Routing routing = 10;
  int64 seconds_from = 11;
  int64 seconds_to = 12;
}